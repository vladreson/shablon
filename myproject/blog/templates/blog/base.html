<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Блог - Мой Магазин{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .header, .footer { background: #f4f4f4; padding: 10px; text-align: center; }
        .menu { margin: 20px 0; }
        .menu a { margin: 0 10px; text-decoration: none; color: #333; }
        .blog-post { border: 1px solid #ddd; padding: 20px; margin: 10px 0; border-radius: 5px; }
        .btn { display: inline-block; padding: 10px 15px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 Блог Моего Магазина</h1>
        {% include 'catalog/menu.html' %}
    </div>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

    <div class="footer">
        <p>© 2024 Блог Моего Магазина</p>
    </div>
</body>
</html>
