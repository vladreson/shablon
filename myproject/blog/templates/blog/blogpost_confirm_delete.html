{% extends 'blog/base.html' %}

{% block title %}Удаление статьи - Блог{% endblock %}

{% block content %}
<h2>Удаление статьи</h2>
<p>Вы уверены, что хотите удалить статью "{{ object.title }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn">🗑️ Да, удалить</button>
    <a href="{% url 'blog:list' %}" class="btn">❌ Отмена</a>
</form>
{% endblock %}
