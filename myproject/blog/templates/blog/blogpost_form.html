{% extends 'blog/base.html' %}

{% block title %}{% if object %}Редактирование{% else %}Создание{% endif %} статьи - Блог{% endblock %}

{% block content %}
<h2>{% if object %}Редактирование статьи{% else %}Создание новой статьи{% endif %}</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">💾 Сохранить</button>
    <a href="{% url 'blog:list' %}" class="btn">❌ Отмена</a>
</form>
{% endblock %}
